# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

#################################################
# DARK-BLACK ASTOLFO FEMBOY THEME (Hyprland)
#################################################

# --- Palette ---
# bg0  #0f0f12
# bg1  #1a1b1f
# surf #23242a
# edge #2e2f36
# mute #3a3a40
# text #e4e4e7
# accent #f38ba8
# accent2 #ffb3c6


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/

monitorv2 {
  output = HDMI-A-1
  mode = 2560x1440@165
  position = 1922x-350
  scale = 1
  transform = 0
}

monitorv2 {
  output = HDMI-A-2
  mode = 1920x1080@144
  position = 0x0
  scale = 1
  transform = 0
}


###############
### PLUGINS ###
###############

plugin {
	hyprsplit {
	    persistent_workspaces = false
	    num_workspaces = 10
	}
}

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = walker
$search_engine = firefox

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = hyprpm reload -n
exec-once = env LC_TIME=ja_JP.UTF-8 waybar
exec-once = spotify-launcher
exec-once = xfsettingsd
exec-once = hyprpaper
exec-once = openrgb -p default
exec-once = elephant
exec-once = walker --gapplication-service

# Dark Theme
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec-once = gsettings set org.gnome.desktop.interface icon-theme "Papirus-Dark" 

# Authentication
exec-once = systemctl --user start hyprpolkitagent

# Notifications
exec-once = mako

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = HYPRCURSOR_THEME,$XDG_CONFIG_HOME/icons/rose-pine-hyprcursor
env = HYPRCURSOR_SIZE,22
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = QT_QPA_PLATFORMTHEME,qt6ct
env = CHROMIUM_FLAGS,--force-dark-mode

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 10
    gaps_out = 20

    border_size = 3
   

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(f38ba8ee) rgba(ffb3c6ee) 90deg
    col.inactive_border = rgba(a37783ee)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 3

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 5
        render_power = 10
        color = rgba(f38ba8ee)
        sharp=false
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 4
        passes = 3
    }
}

animations {
    enabled = yes

    # softer + playful curves
    bezier = softOut,0.05,0.9,0.1,1
    bezier = softInOut,0.65,0,0.35,1
    bezier = overshoot,0.34,1.7,0.3,1
    bezier = floaty,0.23,1,0.32,1

    animation = global, 1, 7, default

    # windows
    animation = windows, 1, 7, floaty
    animation = windowsIn, 1, 8, overshoot, popin 80%
    animation = windowsOut, 1, 5, softInOut, popin 80%

    # borders
    animation = border, 1, 7, softOut

    # fades
    animation = fadeIn, 1, 5, softOut
    animation = fadeOut, 1, 4, softInOut
    animation = fade, 1, 6, softOut

    # layers
    animation = layers, 1, 7, floaty, popin 78%
    animation = layersIn, 1, 7, floaty, popin 78%
    animation = layersOut, 1, 5, floaty, popin 78%

    # workspaces
    animation = workspaces, 1, 7, softInOut
    animation = workspacesIn, 1, 7, softInOut
    animation = workspacesOut, 1, 7, softInOut
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    smart_split = true
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hxyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = pl
    kb_variant = 
    kb_model =
    kb_options = 
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

cursor {
  no_hardware_cursors = false
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, C, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, S, exec, $menu
bind = CTRL SHIFT, V, exec, walker -s clipboard

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, split:workspace, 1
bind = $mainMod, 2, split:workspace, 2
bind = $mainMod, 3, split:workspace, 3
bind = $mainMod, 4, split:workspace, 4
bind = $mainMod, 5, split:workspace, 5
bind = $mainMod, 6, split:workspace, 6
bind = $mainMod, 7, split:workspace, 7
bind = $mainMod, 8, split:workspace, 8
bind = $mainMod, 9, split:workspace, 9
bind = $mainMod, 0, split:workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, split:movetoworkspace, 1
bind = $mainMod SHIFT, 2, split:movetoworkspace, 2
bind = $mainMod SHIFT, 3, split:movetoworkspace, 3
bind = $mainMod SHIFT, 4, split:movetoworkspace, 4
bind = $mainMod SHIFT, 5, split:movetoworkspace, 5
bind = $mainMod SHIFT, 6, split:movetoworkspace, 6
bind = $mainMod SHIFT, 7, split:movetoworkspace, 7
bind = $mainMod SHIFT, 8, split:movetoworkspace, 8
bind = $mainMod SHIFT, 9, split:movetoworkspace, 9
bind = $mainMod SHIFT, 0, split:movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, split:workspace, r+1
bind = $mainMod, mouse_up, split:workspace, r-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshots and color picker
bind = $mainMod SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = $mainMod SHIFT, R, exec, ~/Dotfiles/scripts/ScreenRecord.sh
bind = $mainMod, P, exec, hyprpicker -a 

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
  name = code_modal_under_cursor
  match:class = ^(Code)$
  match:modal = true

  float = on
  animation = popin
  move = (cursor_x-(window_w/2)) (cursor_y-(window_h/2))
}

windowrule {
  name = floating_pavu
  match:class = ^(org\.pulseaudio\.pavucontrol)$

  float = on
  animation = popin
  move = (cursor_x-(window_w/2)) (cursor_y-(window_h))
}

layerrule {
  name = no_anim_for_selection
  no_anim = on
  match:namespace = selection
}

layerrule {
	name = no_anim_for_picker
	no_anim = on
	match:namespace = hyprpicker
}
