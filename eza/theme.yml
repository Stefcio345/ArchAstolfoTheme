colourful: true

filekinds:
  normal: {foreground: "#e4e4e7"}
  directory: {foreground: "#f38ba8"}      # accent pink
  symlink: {foreground: "#bcd6f2"}
  pipe: {foreground: "#40434d"}
  block_device: {foreground: "#f5d7a8"}
  char_device: {foreground: "#f5d7a8"}
  socket: {foreground: "#40434d"}         # was too close to bg; make visible but muted
  special: {foreground: "#cbd2ff"}
  executable: {foreground: "#b8e0cc"}
  mount_point: {foreground: "#f38ba8"}

perms:
  user_read: {foreground: "#cfcfd4"}
  user_write: {foreground: "#f5d7a8"}
  user_execute_file: {foreground: "#b8e0cc"}
  user_execute_other: {foreground: "#b8e0cc"}
  group_read: {foreground: "#cfcfd4"}
  group_write: {foreground: "#f5d7a8"}
  group_execute: {foreground: "#b8e0cc"}
  other_read: {foreground: "#40434d"}
  other_write: {foreground: "#f5d7a8"}
  other_execute: {foreground: "#b8e0cc"}
  special_user_file: {foreground: "#cbd2ff"}  # slightly brighter than before
  special_other: {foreground: "#40434d"}      # was too dark; keep muted but readable
  attribute: {foreground: "#40434d"}

size:
  major: {foreground: "#cfcfd4"}
  minor: {foreground: "#bcd6f2"}
  number_byte: {foreground: "#e4e4e7"}
  number_kilo: {foreground: "#cfcfd4"}
  number_mega: {foreground: "#cfcfd4"}
  number_giga: {foreground: "#cbd2ff"}
  number_huge: {foreground: "#f38ba8"}
  unit_byte: {foreground: "#40434d"}
  unit_kilo: {foreground: "#40434d"}
  unit_mega: {foreground: "#40434d"}
  unit_giga: {foreground: "#cbd2ff"}
  unit_huge: {foreground: "#f38ba8"}

users:
  user_you: {foreground: "#e4e4e7"}
  user_root: {foreground: "#f38ba8"}
  user_other: {foreground: "#cfcfd4"}
  group_yours: {foreground: "#cfcfd4"}
  group_other: {foreground: "#40434d"}
  group_root: {foreground: "#f38ba8"}

links:
  normal: {foreground: "#bcd6f2"}
  multi_link_file: {foreground: "#dbe9ff"}

git:
  new: {foreground: "#b8e0cc"}
  modified: {foreground: "#f5d7a8"}
  deleted: {foreground: "#f38ba8"}
  renamed: {foreground: "#bcd6f2"}
  typechange: {foreground: "#cbd2ff"}
  ignored: {foreground: "#40434d"}
  conflicted: {foreground: "#ffb3c6"}      # keep the “panic pink”

git_repo:
  branch_main: {foreground: "#e4e4e7"}
  branch_other: {foreground: "#cfcfd4"}
  git_clean: {foreground: "#b8e0cc"}
  git_dirty: {foreground: "#f38ba8"}

security_context:
  colon: {foreground: "#40434d"}
  user: {foreground: "#cfcfd4"}
  role: {foreground: "#cfcfd4"}
  typ: {foreground: "#40434d"}            # was nearly bg; make it muted not invisible
  range: {foreground: "#cbd2ff"}

file_type:
  image: {foreground: "#f5d7a8"}
  video: {foreground: "#f38ba8"}
  music: {foreground: "#b8e0cc"}
  lossless: {foreground: "#bcd6f2"}
  crypto: {foreground: "#40434d"}
  document: {foreground: "#e4e4e7"}
  compressed: {foreground: "#cbd2ff"}
  temp: {foreground: "#ffb3c6"}
  compiled: {foreground: "#cbd2ff"}
  build: {foreground: "#40434d"}
  source: {foreground: "#cfcfd4"}

punctuation: {foreground: "#40434d"}
date: {foreground: "#f5d7a8"}
inode: {foreground: "#40434d"}
blocks: {foreground: "#40434d"}
header: {foreground: "#e4e4e7"}
octal: {foreground: "#bcd6f2"}
flags: {foreground: "#cbd2ff"}

symlink_path: {foreground: "#bcd6f2"}
control_char: {foreground: "#cbd2ff"}
broken_symlink: {foreground: "#f38ba8"}
broken_path_overlay: {foreground: "#40434d"}   # overlay should be visible, not vanish
